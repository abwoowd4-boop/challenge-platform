<!DOCTYPE html><html lang="ar" dir="rtl"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>إنشاء حساب</title>
<style>*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Segoe UI,sans-serif;min-height:100vh;color:#fff;background:radial-gradient(circle at top right, rgba(91,160,255,.18), transparent 30%),radial-gradient(circle at top left, rgba(255,118,146,.14), transparent 30%),linear-gradient(135deg,#07111f,#122946);display:flex;align-items:center;justify-content:center;padding:20px}.card{width:min(620px,100%);background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);border-radius:30px;box-shadow:0 18px 50px rgba(0,0,0,.28);backdrop-filter:blur(14px);padding:28px}.title{text-align:center;font-size:40px;font-weight:900;margin:0 0 8px}.sub{text-align:center;color:rgba(255,255,255,.78);line-height:1.9;margin:0 0 20px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{margin:0 0 14px}.label{display:block;margin-bottom:8px;font-weight:800;color:rgba(255,255,255,.86)}.input{width:100%;padding:16px 18px;border-radius:18px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#fff;font-size:17px;outline:none}.btn{width:100%;border:none;border-radius:18px;padding:16px 18px;font-size:18px;font-weight:900;cursor:pointer;color:#fff;background:linear-gradient(135deg,#3c7dff,#625dff);margin-top:8px}.msg{min-height:24px;margin-top:12px;color:#ffd6de;font-weight:800;text-align:center}.links{margin-top:16px;text-align:center}.links a{color:#cfe3ff;text-decoration:none;font-weight:800}</style>
</head><body><div class="card"><h1 class="title">إنشاء حساب جديد</h1><p class="sub">أنشئ حساب العميل أولاً، وبعدها فعّل الاشتراك بكود التفعيل حتى يتم ربط حسابك بغرفتك الخاصة.</p><div class="grid"><div class="field"><label class="label">الاسم</label><input id="name" class="input"></div><div class="field"><label class="label">الإيميل</label><input id="email" class="input" type="email"></div></div><div class="field"><label class="label">كلمة المرور</label><input id="password" class="input" type="password"></div><button class="btn" onclick="registerUser()">إنشاء الحساب</button><div id="msg" class="msg"></div><div class="links"><a href="/login">عندي حساب بالفعل</a></div></div><script>
const msg=document.getElementById('msg');
async function registerUser(){msg.textContent='جارِ إنشاء الحساب...'; const name=document.getElementById('name').value.trim(); const email=document.getElementById('email').value.trim(); const password=document.getElementById('password').value; try{const res=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password})}); const data=await res.json(); if(!res.ok){msg.textContent=data.message||'تعذر إنشاء الحساب'; return;} localStorage.setItem('challenge_user_token',data.token); location.href='/activate';}catch(e){msg.textContent='تعذر الاتصال بالخادم';}}
</script></body></html>
