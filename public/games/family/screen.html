<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>فاميلي فيود</title><script src="/socket.io/socket.io.js"></script><script src="/room-client.js"></script><script src="/game-pro-fx.js"></script><script src="/gamefx.js"></script><style>
*{box-sizing:border-box}html,body{height:100%}body{margin:0;overflow:hidden;font-family:Tahoma,"Segoe UI",sans-serif;color:#fff;background:#050b1d}.bg{position:fixed;inset:0;background:radial-gradient(circle at 50% -10%,rgba(255,209,102,.33),transparent 28%),radial-gradient(circle at 12% 18%,rgba(57,126,255,.28),transparent 28%),radial-gradient(circle at 88% 20%,rgba(239,71,111,.22),transparent 30%),linear-gradient(135deg,#050b1d,#071a3b 46%,#081225);z-index:-3}.bg:before{content:"";position:absolute;inset:-30%;background:conic-gradient(from 0deg,transparent,rgba(255,255,255,.08),transparent,rgba(255,209,102,.08),transparent);animation:spin 22s linear infinite;filter:blur(6px)}.bg:after{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px);background-size:52px 52px;mask-image:radial-gradient(circle at 50% 42%,#000,transparent 74%)}@keyframes spin{to{transform:rotate(360deg)}}.page{height:100vh;padding:22px;display:grid;grid-template-rows:auto 1fr auto;gap:16px}.top{display:grid;grid-template-columns:minmax(230px,1fr) auto minmax(230px,1fr);align-items:center;gap:18px}.brand{text-align:center;position:relative}.brand .logo{font-size:clamp(34px,4vw,68px);font-weight:900;letter-spacing:-1px;text-shadow:0 6px 28px rgba(255,209,102,.28)}.brand .sub{margin-top:5px;color:rgba(255,255,255,.72);font-weight:900}.team{position:relative;padding:18px 24px;border-radius:30px;background:linear-gradient(135deg,rgba(255,255,255,.16),rgba(255,255,255,.07));border:1px solid rgba(255,255,255,.19);box-shadow:0 18px 48px rgba(0,0,0,.28),inset 0 0 0 1px rgba(255,255,255,.04);overflow:hidden}.team:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,209,102,.18),transparent);opacity:.7}.team.left{text-align:left}.team.left:before{background:linear-gradient(270deg,rgba(71,217,139,.16),transparent)}.name{position:relative;font-size:clamp(20px,2vw,32px);font-weight:900}.score{position:relative;font-size:clamp(44px,5.2vw,86px);font-weight:900;color:#ffd166;line-height:1;text-shadow:0 8px 26px rgba(255,209,102,.25)}.main{display:grid;grid-template-columns:1fr;min-height:0}.board{align-self:stretch;border-radius:38px;padding:22px;background:linear-gradient(180deg,rgba(255,255,255,.13),rgba(255,255,255,.055));border:1px solid rgba(255,255,255,.2);box-shadow:0 28px 90px rgba(0,0,0,.42),inset 0 0 80px rgba(255,209,102,.045);display:grid;grid-template-rows:auto 1fr;gap:16px;min-height:0}.question{min-height:100px;border-radius:28px;padding:18px 26px;display:grid;place-items:center;text-align:center;font-size:clamp(30px,4.25vw,70px);font-weight:900;line-height:1.25;background:linear-gradient(135deg,rgba(255,209,102,.2),rgba(255,255,255,.075));border:1px solid rgba(255,209,102,.28);box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)}.answers{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-content:center;min-height:0}.answer{min-height:78px;border-radius:24px;background:linear-gradient(135deg,rgba(17,42,86,.95),rgba(10,23,50,.93));border:1px solid rgba(255,255,255,.15);display:grid;grid-template-columns:70px 1fr 88px;align-items:center;overflow:hidden;box-shadow:0 12px 28px rgba(0,0,0,.22);transform:translateY(10px);opacity:0;animation:popIn .42s cubic-bezier(.2,1.4,.3,1) forwards}.answer:nth-child(2){animation-delay:.04s}.answer:nth-child(3){animation-delay:.08s}.answer:nth-child(4){animation-delay:.12s}.answer:nth-child(5){animation-delay:.16s}.answer:nth-child(6){animation-delay:.2s}.answer.revealed{background:linear-gradient(135deg,rgba(255,209,102,.95),rgba(255,153,0,.9));color:#10172a;box-shadow:0 0 34px rgba(255,209,102,.28),0 12px 32px rgba(0,0,0,.25);animation:flipReveal .55s cubic-bezier(.2,1.3,.3,1) forwards}.num,.pts{height:100%;display:grid;place-items:center;background:rgba(255,255,255,.12);font-size:clamp(24px,2.4vw,38px);font-weight:900}.text{padding:0 18px;font-size:clamp(23px,2.5vw,42px);font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.hiddenAns .text{text-align:center;color:rgba(255,255,255,.55);letter-spacing:7px}.footer{display:grid;grid-template-columns:1fr auto 1fr;gap:18px;align-items:center}.bank{position:relative;text-align:center;min-width:min(520px,48vw);padding:14px 38px;border-radius:32px;background:linear-gradient(135deg,rgba(255,209,102,.18),rgba(255,255,255,.08));border:1px solid rgba(255,209,102,.32);box-shadow:0 18px 48px rgba(0,0,0,.28);overflow:hidden}.bank.flash{animation:bankPulse .55s}.lab{font-size:18px;color:rgba(255,255,255,.76);font-weight:900}.val{font-size:clamp(54px,6vw,92px);font-weight:900;color:#ffd166;line-height:1;text-shadow:0 8px 26px rgba(255,209,102,.27)}.status{font-size:clamp(17px,1.55vw,25px);font-weight:900;color:rgba(255,255,255,.84);margin-top:5px}.strikes{min-height:96px;border-radius:28px;padding:18px;display:grid;place-items:center;font-size:clamp(44px,5vw,82px);font-weight:900;letter-spacing:12px;color:#ff5f86;text-shadow:0 0 24px rgba(239,71,111,.5);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.11)}.strikes.shake{animation:shake .5s}.winner{position:fixed;inset:0;display:none;place-items:center;background:rgba(2,6,18,.72);backdrop-filter:blur(12px);z-index:50}.winner.show{display:grid}.winnerCard{width:min(760px,92vw);padding:44px;border-radius:38px;background:linear-gradient(135deg,rgba(255,209,102,.95),rgba(255,255,255,.9));color:#111827;text-align:center;box-shadow:0 30px 120px rgba(0,0,0,.45);animation:winPop .7s cubic-bezier(.2,1.5,.25,1)}.winnerCard .w1{font-size:28px;font-weight:900}.winnerCard .w2{font-size:clamp(42px,6vw,82px);font-weight:900;margin-top:8px}@keyframes popIn{to{transform:translateY(0);opacity:1}}@keyframes flipReveal{0%{transform:rotateX(90deg) scale(.96);opacity:.2}100%{transform:rotateX(0) scale(1);opacity:1}}@keyframes bankPulse{50%{transform:scale(1.06);box-shadow:0 0 60px rgba(255,209,102,.36)}}@keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-8px)}40%,60%{transform:translateX(8px)}}@keyframes winPop{from{transform:scale(.72);opacity:0}to{transform:scale(1);opacity:1}}@media(max-width:900px){body{overflow:auto}.page{height:auto;min-height:100vh}.top,.footer{grid-template-columns:1fr}.team.left{text-align:right}.answers{grid-template-columns:1fr}.bank{min-width:100%}}

.soundBtn{position:fixed;bottom:18px;left:18px;z-index:80;border:none;border-radius:999px;padding:14px 18px;background:linear-gradient(135deg,#ffd166,#ffb703);color:#111827;font-weight:900;font-size:16px;box-shadow:0 16px 42px rgba(0,0,0,.35);cursor:pointer}.soundBtn.enabled{background:linear-gradient(135deg,#47d98b,#0ea35b);color:#fff}.soundHint{position:fixed;bottom:78px;left:18px;z-index:80;background:rgba(5,11,29,.82);border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:10px 13px;font-weight:900;color:rgba(255,255,255,.86);box-shadow:0 16px 42px rgba(0,0,0,.28)}.fxFlash{position:fixed;inset:0;pointer-events:none;z-index:60;opacity:0}.fxFlash.wrong{background:radial-gradient(circle,rgba(239,71,111,.34),rgba(239,71,111,.08) 35%,transparent 70%);animation:fxFade .45s}.fxFlash.correct{background:radial-gradient(circle,rgba(71,217,139,.28),rgba(255,209,102,.12) 38%,transparent 70%);animation:fxFade .5s}.fxFlash.start{background:radial-gradient(circle,rgba(255,209,102,.30),rgba(72,129,255,.12) 38%,transparent 75%);animation:fxFade .65s}@keyframes fxFade{0%{opacity:0}22%{opacity:1}100%{opacity:0}}
</style><link rel="stylesheet" href="/game-pro-theme.css"></head><body><div class="bg"></div><div class="page"><header class="top"><section class="team"><div id="team1Name" class="name">الفريق الأحمر</div><div id="team1Score" class="score">0</div></section><section class="brand"><div class="logo">فاميلي فيود</div><div class="sub">أكثر إجابة قالتها الجماهير تفوز</div></section><section class="team left"><div id="team2Name" class="name">الفريق الأزرق</div><div id="team2Score" class="score">0</div></section></header><main class="main"><section class="board"><div id="question" class="question">بانتظار السؤال</div><div id="answers" class="answers"></div></section></main><footer class="footer"><div id="strikes1" class="strikes"></div><section id="bankBox" class="bank"><div class="lab">بنك الجولة</div><div id="bank" class="val">0</div><div id="status" class="status">—</div></section><div id="strikes2" class="strikes"></div></footer></div><div id="winner" class="winner"><div class="winnerCard"><div class="w1">انتهت اللعبة</div><div id="winnerText" class="w2">الفائز</div></div></div><button id="soundBtn" class="soundBtn" onclick="enableFeudSound()">🔊 تفعيل الصوت</button><div id="soundHint" class="soundHint">اضغط مرة واحدة لتفعيل مؤثرات فاميلي فيود</div><div id="fxFlash" class="fxFlash"></div><script>
const socket=createRoomSocket();
socket.emit('registerHost',{page:'family-screen'});
socket.on('gameEnded',()=>{location.href=withRoom('/')});
let lastBank=0,lastS1=0,lastS2=0,lastPhase='',lastRevealedCount=0,lastWinnerText='';
let audioCtx=null,soundEnabled=false;
const soundBtn=document.getElementById('soundBtn');
const soundHint=document.getElementById('soundHint');
const fxFlash=document.getElementById('fxFlash');
function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function pulse(el,cls){el.classList.remove(cls);void el.offsetWidth;el.classList.add(cls);setTimeout(()=>el.classList.remove(cls),700)}
function flash(type){fxFlash.className='fxFlash '+type;void fxFlash.offsetWidth;setTimeout(()=>{fxFlash.className='fxFlash'},700)}
function enableFeudSound(){try{audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();soundEnabled=true;soundBtn.textContent='🔊 الصوت مفعل';soundBtn.classList.add('enabled');soundHint.style.display='none';playSound('ready')}catch(e){console.warn('Audio not available',e)}}
window.enableFeudSound=enableFeudSound;
['click','touchstart','keydown'].forEach(ev=>window.addEventListener(ev,()=>{if(!soundEnabled)enableFeudSound()},{once:true,passive:true}));
function tone(freq,duration=.16,delay=0,type='sine',gain=.08){if(!soundEnabled||!audioCtx)return;const t=audioCtx.currentTime+delay,osc=audioCtx.createOscillator(),g=audioCtx.createGain();osc.type=type;osc.frequency.setValueAtTime(freq,t);g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(gain,t+.015);g.gain.exponentialRampToValueAtTime(.0001,t+duration);osc.connect(g);g.connect(audioCtx.destination);osc.start(t);osc.stop(t+duration+.03)}
function noise(duration=.25,delay=0,gain=.08){if(!soundEnabled||!audioCtx)return;const sr=audioCtx.sampleRate,buffer=audioCtx.createBuffer(1,Math.floor(sr*duration),sr),data=buffer.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*(1-i/data.length);const src=audioCtx.createBufferSource(),g=audioCtx.createGain(),t=audioCtx.currentTime+delay;src.buffer=buffer;g.gain.setValueAtTime(gain,t);g.gain.exponentialRampToValueAtTime(.0001,t+duration);src.connect(g);g.connect(audioCtx.destination);src.start(t);src.stop(t+duration+.02)}
function playSound(kind){if(!soundEnabled)return;if(kind==='ready'){tone(520,.08,0,'triangle',.055);tone(740,.1,.09,'triangle',.055)}else if(kind==='start'){flash('start');tone(220,.12,0,'sawtooth',.07);tone(330,.12,.10,'sawtooth',.07);tone(440,.12,.20,'sawtooth',.075);tone(660,.25,.32,'triangle',.09)}else if(kind==='reveal'){flash('correct');tone(660,.09,0,'triangle',.075);tone(880,.11,.08,'triangle',.08);tone(1175,.16,.17,'triangle',.085)}else if(kind==='bank'){flash('correct');tone(392,.09,0,'square',.055);tone(523,.09,.08,'square',.055);tone(659,.12,.16,'square',.065);tone(784,.18,.27,'triangle',.075)}else if(kind==='wrong'){flash('wrong');noise(.22,0,.09);tone(170,.26,0,'sawtooth',.10);tone(120,.30,.08,'sawtooth',.09)}else if(kind==='win'){flash('correct');[523,659,784,1046].forEach((f,i)=>tone(f,.16,i*.11,'triangle',.08));tone(1318,.45,.48,'triangle',.09)}}
socket.on('familyStrikeFlash',()=>playSound('wrong'));
socket.on('stateUpdate',state=>{const g=state.games?.family||{},t=state.teamNames||{},sc=state.teamScores||{};team1Name.textContent=t.team1||'الفريق الأحمر';team2Name.textContent=t.team2||'الفريق الأزرق';team1Score.textContent=sc.team1||0;team2Score.textContent=sc.team2||0;const currentBank=Number(g.bank||0);bank.textContent=currentBank;if(currentBank!==lastBank){pulse(bankBox,'flash');if(currentBank>lastBank)playSound('reveal');if(currentBank===0&&lastBank>0)playSound('bank');lastBank=currentBank}status.textContent=g.statusText||'—';const s1=Number(g.strikes?.team1||0),s2=Number(g.strikes?.team2||0);strikes1.textContent='✖'.repeat(s1);strikes2.textContent='✖'.repeat(s2);if(s1>lastS1){pulse(strikes1,'shake');playSound('wrong')}if(s2>lastS2){pulse(strikes2,'shake');playSound('wrong')}lastS1=s1;lastS2=s2;question.textContent=g.currentQuestion?.q||'بانتظار بدء الجولة';const answersList=g.currentQuestion?.answers||[];const revealedCount=answersList.filter(a=>!!g.revealed?.[String(a.id)]).length;if(revealedCount>lastRevealedCount)playSound('reveal');lastRevealedCount=revealedCount;answers.innerHTML=answersList.map(a=>{const r=!!g.revealed?.[String(a.id)];return `<div class="answer ${r?'revealed':'hiddenAns'}"><div class="num">${a.id+1}</div><div class="text">${r?esc(a.text):'••••••'}</div><div class="pts">${r?a.points:'؟'}</div></div>`}).join('')||'<div class="status">افتح لوحة التحكم وابدأ الجولة.</div>';winner.classList.toggle('show',g.phase==='finished');winnerText.textContent=g.winnerText||'النتيجة النهائية';if(g.phase==='finished'&&g.winnerText&&g.winnerText!==lastWinnerText){playSound('win');lastWinnerText=g.winnerText}if(g.phase!==lastPhase){if(['faceoff','question','choice'].includes(g.phase))playSound('start');lastPhase=g.phase||''}});
</script></body></html>
