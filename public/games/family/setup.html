<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>إعدادات فاميلي فيود</title><script src="/socket.io/socket.io.js"></script><script src="/room-client.js"></script><style>
*{box-sizing:border-box}body{margin:0;font-family:Tahoma,"Segoe UI",sans-serif;min-height:100vh;color:#fff;background:#07111f}.bg{position:fixed;inset:0;background:radial-gradient(circle at 50% 0%,rgba(255,209,102,.25),transparent 32%),radial-gradient(circle at 15% 20%,rgba(62,126,255,.22),transparent 31%),linear-gradient(135deg,#07111f,#122946);z-index:-1}.page{min-height:100vh;padding:22px;display:grid;place-items:center}.card{width:min(800px,100%);padding:30px;border-radius:34px;background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.07));border:1px solid rgba(255,255,255,.17);box-shadow:0 24px 70px rgba(0,0,0,.35);backdrop-filter:blur(16px);animation:rise .45s ease both}.title{text-align:center;font-size:clamp(36px,6vw,56px);font-weight:900}.muted{color:rgba(255,255,255,.76);line-height:1.8}.label{margin-top:18px;font-weight:900}.input{width:100%;border:none;outline:none;border-radius:20px;padding:17px;font-size:18px;margin-top:8px;background:rgba(255,255,255,.94);color:#111827}.row{display:flex;gap:12px;flex-wrap:wrap}.btn{border:none;border-radius:18px;padding:15px 19px;margin-top:16px;font-size:17px;font-weight:900;cursor:pointer;color:#fff;background:linear-gradient(135deg,#3c7dff,#625dff);box-shadow:0 14px 30px rgba(0,0,0,.22)}.green{background:linear-gradient(135deg,#47d98b,#0ea35b)}.gold{background:linear-gradient(135deg,#ffd166,#ffb703);color:#172033}.info{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px}.box{padding:16px;border-radius:22px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);text-align:center;font-weight:900}@keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}@media(max-width:650px){.info{grid-template-columns:1fr}.row{display:grid}.btn{width:100%}}
</style><link rel="stylesheet" href="/game-pro-theme.css"><script src="/game-pro-fx.js"></script></head><body><div class="bg"></div><div class="page"><div class="card"><div class="title">إعدادات فاميلي فيود</div><p class="muted">اختَر عدد الجولات ثم افتح لوحة التشغيل. اللعبة تعتمد على كشف الإجابات، تجميع بنك الجولة، ثم احتساب البنك للفريق الفائز أو صاحب السرقة.</p><div class="info"><div class="box">إجابات مخفية</div><div class="box">أخطاء ×3</div><div class="box">فرصة سرقة</div></div><div class="label">عدد الجولات</div><input id="rounds" class="input" type="number" min="1" max="10" value="5"><div class="row"><button class="btn green" onclick="save()">حفظ ودخول اللعبة</button><button class="btn" onclick="socket.emit('exitGameToTeams');setTimeout(()=>location.href=withRoom('/games'),80)">العودة لقائمة الألعاب</button></div></div></div><script>
const socket=createRoomSocket();socket.emit('registerHost',{page:'family-setup'});socket.emit('familyPrime');function save(){socket.emit('familyUpdateConfig',{rounds:Number(rounds.value)||5});setTimeout(()=>location.href=withRoom('/games/family/host'),120)}socket.on('stateUpdate',state=>{const g=state.games?.family||{};rounds.value=g.settings?.rounds||5});
</script></body></html>
