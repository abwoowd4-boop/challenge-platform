<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>فاميلي فيود - لاعب</title><script src="/socket.io/socket.io.js"></script><script src="/room-client.js"></script><script src="/game-pro-fx.js"></script><style>
*{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family:Tahoma,"Segoe UI",sans-serif;min-height:100vh;color:#fff;background:#07111f;overflow:hidden}.bg{position:fixed;inset:0;background:radial-gradient(circle at 50% 0%,rgba(255,209,102,.28),transparent 34%),radial-gradient(circle at 15% 20%,rgba(62,126,255,.28),transparent 32%),linear-gradient(135deg,#07111f,#122946);z-index:-2}.bg:after{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:42px 42px}.page{min-height:100vh;padding:18px;display:grid;place-items:center}.card{width:min(620px,100%);padding:28px;border-radius:34px;background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.07));border:1px solid rgba(255,255,255,.17);box-shadow:0 24px 70px rgba(0,0,0,.35);text-align:center;backdrop-filter:blur(16px);animation:rise .45s ease both}.title{font-size:clamp(38px,10vw,58px);font-weight:900;letter-spacing:-1px}.muted{color:rgba(255,255,255,.76);line-height:1.8}.input{width:100%;border:none;outline:none;border-radius:20px;padding:17px 18px;font-size:18px;margin-top:16px;background:rgba(255,255,255,.93);color:#111827}.btn{width:100%;border:none;border-radius:20px;padding:17px;margin-top:12px;font-size:18px;font-weight:900;color:#fff;background:linear-gradient(135deg,#47d98b,#0ea35b);box-shadow:0 16px 36px rgba(0,0,0,.25)}.btn.gold{background:linear-gradient(135deg,#ffd166,#ffb703);color:#142033}.btn.blue{background:linear-gradient(135deg,#3c7dff,#625dff)}.team{font-size:26px;font-weight:900;color:#ffd166;margin:12px 0}.pill{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:9px 13px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.13);font-weight:900}.score{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}.box{padding:16px;border-radius:20px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12)}.big{font-size:36px;font-weight:900}.statusCard{margin-top:16px;padding:16px;border-radius:22px;background:linear-gradient(135deg,rgba(255,209,102,.16),rgba(255,255,255,.07));border:1px solid rgba(255,209,102,.22)}.question{font-size:24px;font-weight:900;line-height:1.55;margin:10px 0;padding:16px;border-radius:20px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14)}.actions{margin-top:14px;padding:14px;border-radius:22px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12)}.hidden{display:none!important}.pulse{animation:pulse 1.5s infinite}@keyframes rise{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}@keyframes pulse{50%{transform:scale(1.035);box-shadow:0 0 38px rgba(255,209,102,.18)}}@media(max-width:520px){.page{padding:12px}.card{padding:22px}.score{grid-template-columns:1fr}body{overflow:auto}}
</style><link rel="stylesheet" href="/game-pro-theme.css"></head><body><div class="bg"></div><div class="page"><div class="card"><div class="title">فاميلي فيود</div><div id="joinBox"><p class="muted">اكتب اسمك وانضم. في بداية كل جولة قد يتم اختيارك للمواجهة.</p><input id="nameInput" class="input" placeholder="اسم اللاعب"><button class="btn" onclick="join()">دخول اللعبة</button></div><div id="playBox" style="display:none"><span class="pill">جاهز للعب</span><div id="playerName" class="team">—</div><div id="teamName" class="team">—</div><div class="statusCard pulse"><p id="status" class="muted" style="margin:0">انتظر السؤال على شاشة العرض.</p></div><div id="faceoffAction" class="actions hidden"><div class="pill">أنت في مواجهة البداية</div><div id="faceQuestion" class="question">—</div><button id="buzzBtn" class="btn gold pulse" onclick="sendFaceAnswer()">اضغط ثم قل إجابتك للمقدم</button><p id="buzzHint" class="muted">السؤال ظاهر لك. اضغط الزر بسرعة ثم قل إجابتك بصوتك.</p></div><div id="choiceAction" class="actions hidden"><div class="pill">أنت فزت بالمواجهة</div><div class="question">تبغى فريقك يلعب السؤال أو تنقله للفريق الآخر؟</div><button class="btn" onclick="chooseRound('play')">نلعب السؤال</button><button class="btn blue" onclick="chooseRound('pass')">نمرره للفريق الآخر</button></div><div class="score"><div class="box"><div>بنك الجولة</div><div id="bank" class="big">0</div></div><div class="box"><div>الجولة</div><div id="round" class="big">0</div></div></div></div></div></div><script>
const socket=createRoomSocket();socket.on('gameEnded',()=>{location.href=withRoom('/player')});let playerId=localStorage.getItem('platform_player_id')||localStorage.getItem('playerId')||('p_'+Math.random().toString(36).slice(2));localStorage.setItem('platform_player_id',playerId);localStorage.setItem('playerId',playerId);let currentState=null;let sentFace=false;function join(){const name=(nameInput.value||localStorage.getItem('platform_player_name')||localStorage.getItem('playerName')||'').trim();if(!name)return alert('اكتب اسمك');localStorage.setItem('platform_player_name',name);localStorage.setItem('playerName',name);socket.emit('registerPlayer',{playerId,name})}if(localStorage.getItem('platform_player_name')||localStorage.getItem('playerName')){nameInput.value=localStorage.getItem('platform_player_name')||localStorage.getItem('playerName');join()}socket.on('connect',()=>{if(localStorage.getItem('platform_player_name')||localStorage.getItem('playerName'))join()});socket.on('playerRegistered',p=>{joinBox.style.display='none';playBox.style.display='block';playerName.textContent=p.name});function sendFaceAnswer(){socket.emit('familyFaceoffAnswer',{playerId,text:'جاهز للإجابة شفهيًا'});sentFace=true;if(window.buzzBtn){buzzBtn.disabled=true;buzzBtn.textContent='تم الضغط — قل إجابتك الآن';}if(window.buzzHint)buzzHint.textContent='وصل التنبيه للمقدم. قل إجابتك بصوتك الآن.';}
function chooseRound(choice){socket.emit('familyFaceoffChoice',{playerId,choice});choiceAction.classList.add('hidden')}
socket.on('stateUpdate',state=>{currentState=state;const g=state.games?.family||{},me=(state.players||[]).find(p=>p.playerId===playerId),tn=state.teamNames||{};if(me){teamName.textContent=me.team==='team1'?(tn.team1||'الفريق الأحمر'):(tn.team2||'الفريق الأزرق')}status.textContent=g.statusText||'انتظر تعليمات المقدم';bank.textContent=g.bank||0;round.textContent=g.round||0;const f=g.faceoff||{},isFace=[f.team1PlayerId,f.team2PlayerId].includes(playerId),hasAns=!!(f.answers&&f.answers[playerId]);faceoffAction.classList.toggle('hidden',!(g.phase==='faceoff'&&isFace));choiceAction.classList.toggle('hidden',!(g.phase==='choice'&&f.winnerPlayerId===playerId));if(g.phase==='faceoff'&&isFace){faceQuestion.textContent=g.currentQuestion?.q||'السؤال';if(window.buzzBtn){buzzBtn.disabled=!!(hasAns||sentFace);buzzBtn.textContent=(hasAns||sentFace)?'تم الضغط — قل إجابتك الآن':'اضغط ثم قل إجابتك للمقدم';}if(window.buzzHint)buzzHint.textContent=(hasAns||sentFace)?'وصل التنبيه للمقدم. قل إجابتك بصوتك الآن.':'السؤال ظاهر لك. اضغط الزر بسرعة ثم قل إجابتك بصوتك.';}if(g.phase!=='faceoff')sentFace=false;});
</script></body></html>
