<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>تشغيل فاميلي فيود</title><script src="/socket.io/socket.io.js"></script><script src="/room-client.js"></script><script src="/game-pro-fx.js"></script><script src="/gamefx.js"></script><style>
*{box-sizing:border-box}body{margin:0;font-family:Tahoma,"Segoe UI",sans-serif;min-height:100vh;color:#fff;background:#06101f}.bg{position:fixed;inset:0;background:radial-gradient(circle at 78% 0%,rgba(255,209,102,.26),transparent 31%),radial-gradient(circle at 15% 8%,rgba(72,129,255,.24),transparent 32%),linear-gradient(135deg,#06101f,#102b56 55%,#070d1e);z-index:-2}.bg:after{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:44px 44px}.hidden{display:none!important}.glass{background:linear-gradient(180deg,rgba(255,255,255,.13),rgba(255,255,255,.065));border:1px solid rgba(255,255,255,.16);border-radius:30px;box-shadow:0 20px 60px rgba(0,0,0,.3);backdrop-filter:blur(16px)}.top{position:sticky;top:0;z-index:20;padding:12px 16px;background:rgba(4,12,26,.72);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.09)}.bar{max-width:1440px;margin:0 auto;display:grid;grid-template-columns:54px 1fr 54px;align-items:center}.iconBtn{width:48px;height:48px;border:none;border-radius:16px;background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.16);font-size:24px;font-weight:900;cursor:pointer}.title{text-align:center;font-size:28px;font-weight:900}.menuPanel{position:fixed;top:78px;right:18px;width:310px;padding:14px;z-index:95}.page{padding:18px}.wrap{max-width:1440px;margin:0 auto;display:grid;gap:18px}.hero{padding:22px;display:grid;grid-template-columns:1.25fr .75fr;gap:18px;align-items:stretch}.heroTitle{font-size:clamp(36px,4vw,66px);font-weight:900;line-height:1.05}.muted{color:rgba(255,255,255,.76);line-height:1.75}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.btn{border:none;border-radius:18px;padding:13px 17px;font-size:15px;font-weight:900;cursor:pointer;color:#fff;background:linear-gradient(135deg,#3c7dff,#625dff);box-shadow:0 10px 24px rgba(0,0,0,.18);transition:.18s transform,.18s filter}.btn:hover{transform:translateY(-2px);filter:brightness(1.08)}.btn:active{transform:translateY(0) scale(.98)}.btn.green{background:linear-gradient(135deg,#47d98b,#0ea35b)}.btn.red{background:linear-gradient(135deg,#ff6785,#ef476f)}.btn.gold{background:linear-gradient(135deg,#ffd166,#ffb703);color:#172033}.btn.ghost{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16)}.btn[disabled]{opacity:.45;cursor:not-allowed}.full{width:100%}.kpis{display:grid;grid-template-columns:1fr 1fr;gap:12px}.kpi{padding:16px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);text-align:center}.kpi .lab{font-size:14px;color:rgba(255,255,255,.66);font-weight:900}.kpi .val{font-size:42px;font-weight:900;color:#ffd166}.teamBox{display:grid;grid-template-columns:1fr 1fr;gap:12px}.team{position:relative;padding:18px;border-radius:26px;background:rgba(255,255,255,.075);border:1px solid rgba(255,255,255,.13);text-align:center;overflow:hidden}.team.active{outline:3px solid rgba(255,209,102,.78);box-shadow:0 0 38px rgba(255,209,102,.18)}.team.active:before{content:"الفريق النشط";position:absolute;top:12px;left:12px;background:#ffd166;color:#172033;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900}.team h2{margin:0 0 6px;font-size:25px}.score{font-size:48px;font-weight:900}.strikes{font-size:32px;min-height:40px;color:#ff6f8f;font-weight:900;letter-spacing:4px}.grid{display:grid;grid-template-columns:1.15fr .85fr;gap:18px}.card{padding:20px}.h2{font-size:25px;font-weight:900;margin:0 0 12px}.questionBox{padding:18px;border-radius:24px;background:linear-gradient(135deg,rgba(255,209,102,.17),rgba(255,255,255,.07));border:1px solid rgba(255,209,102,.25);font-size:28px;font-weight:900;line-height:1.5}.answers{display:grid;gap:10px;margin-top:14px}.answer{display:grid;grid-template-columns:48px 1fr 72px 118px;gap:10px;align-items:center;padding:11px;border-radius:18px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);animation:fadeUp .35s ease both}.answer.revealed{background:rgba(71,217,139,.15);border-color:rgba(71,217,139,.36)}.answer .num,.answer .pts{font-weight:900;text-align:center}.sideGrid{display:grid;gap:18px}.players{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}.player{padding:12px;border-radius:16px;background:rgba(255,255,255,.075);border:1px solid rgba(255,255,255,.12);font-weight:900}.faceoff{margin-top:14px;padding:14px;border-radius:24px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}.faceAnswer{margin-top:8px;padding:10px;border-radius:14px;background:rgba(255,209,102,.12);border:1px solid rgba(255,209,102,.18)}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);opacity:0;background:rgba(8,16,32,.9);border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:13px 18px;box-shadow:0 18px 48px rgba(0,0,0,.35);z-index:100;font-weight:900;transition:.25s}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}@media(max-width:1000px){.hero,.grid{grid-template-columns:1fr}.answer{grid-template-columns:42px 1fr}.teamBox{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}}@media(max-width:560px){.page{padding:12px}.btn{width:100%}.row{display:grid}.kpis{grid-template-columns:1fr}.title{font-size:20px}}
</style><link rel="stylesheet" href="/game-pro-theme.css"></head><body><div class="bg"></div><div class="top"><div class="bar"><button class="iconBtn" onclick="toggleMenu()">☰</button><div class="title">تشغيل فاميلي فيود</div><div></div></div></div><div id="menuPanel" class="menuPanel glass hidden"><div class="row" style="display:grid"><button class="btn ghost full" onclick="location.href=withRoom('/games/family/setup')">إعدادات اللعبة</button><button class="btn ghost full" onclick="socket.emit('showFamilyPlayerQr')">إظهار QR اللاعبين</button><button class="btn red full" onclick="resetGame()">إعادة اللعبة</button><button class="btn red full" onclick="exitGame()">الخروج من اللعبة</button></div></div><div class="page"><div class="wrap"><section class="glass hero"><div><div class="heroTitle">فاميلي فيود</div><p id="status" class="muted">بانتظار البداية</p><div class="row"><button id="startBtn" class="btn green" onclick="startRound()">بدء الجولة</button><button class="btn" onclick="switchTeam()">تبديل الفريق النشط</button><button class="btn gold" onclick="awardActive()">احتساب البنك للنشط</button></div></div><div class="kpis"><div class="kpi"><div class="lab">بنك الجولة</div><div id="bank" class="val">0</div></div><div class="kpi"><div class="lab">الجولة</div><div class="val"><span id="round">0</span>/<span id="rounds">5</span></div></div></div></section><section class="teamBox"><div id="team1" class="team glass"><h2 id="team1Name">الفريق الأحمر</h2><div id="team1Score" class="score">0</div><div id="team1Strikes" class="strikes">—</div><div class="row" style="justify-content:center"><button class="btn red" onclick="addStrike('team1')">خطأ</button><button class="btn gold" onclick="award('team1')">احتساب له</button></div></div><div id="team2" class="team glass"><h2 id="team2Name">الفريق الأزرق</h2><div id="team2Score" class="score">0</div><div id="team2Strikes" class="strikes">—</div><div class="row" style="justify-content:center"><button class="btn red" onclick="addStrike('team2')">خطأ</button><button class="btn gold" onclick="award('team2')">احتساب له</button></div></div></section><section class="grid"><div class="glass card"><h2 class="h2">السؤال والإجابات</h2><div id="question" class="questionBox">ابدأ الجولة لعرض السؤال</div><div id="faceoffBox" class="faceoff"></div><div id="answers" class="answers"></div></div><div class="sideGrid"><div class="glass card"><h2 class="h2">آخر حركة</h2><div id="last" class="muted">—</div></div><div class="glass card"><h2 class="h2">اللاعبون</h2><div id="players" class="players"></div></div></div></section></div></div><div id="toast" class="toast"></div><script>
const socket=createRoomSocket();socket.emit('registerHost',{page:'family-host'});socket.emit('familyPrime');let lastMsg='';const $=id=>document.getElementById(id);function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function toggleMenu(){$('menuPanel').classList.toggle('hidden')}function showToast(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1800)}function startRound(){if(window.GameFX){GameFX.countdownOverlay('مواجهة البداية').then(()=>socket.emit('familyStartRound'))}else socket.emit('familyStartRound')}function addStrike(team){
  if(window.GameFX && typeof GameFX.wrong==='function')GameFX.wrong();
  showToast('جاري تسجيل الخطأ...');
  socket.emit('familyStrike',{team},(res)=>{
    if(res&&res.ok){
      showToast(res.text||('تم تسجيل الخطأ: '+(team==='team2'?'الفريق الثاني':'الفريق الأول')));
    }else{
      showToast('لم يصل تأكيد السيرفر، أعد المحاولة');
      console.warn('familyStrike failed',res);
    }
  });
}
function award(team){if(window.GameFX)GameFX.correct();socket.emit('familyAwardBank',{team})}function awardActive(){socket.emit('familyAwardBank',{})}function switchTeam(){socket.emit('familySwitchTeam');showToast('تم تبديل الفريق النشط')}function resetGame(){socket.emit('familyReset');showToast('تمت إعادة اللعبة')}function exitGame(){socket.emit('exitGameToTeams');showToast('جاري الخروج من اللعبة');setTimeout(()=>{location.href=withRoom('/host')},250)}
socket.on('gameEnded',()=>{location.href=withRoom('/host')});socket.on('familyStrikeFlash',({text}={})=>{if(window.GameFX && typeof GameFX.wrong==='function')GameFX.wrong();showToast(text||'تم تسجيل خطأ')});
function renderFaceoff(g,state){const players=state.players||[],tn=state.teamNames||{},f=g.faceoff||{},ans=f.answers||{};const p1=players.find(p=>p.playerId===f.team1PlayerId),p2=players.find(p=>p.playerId===f.team2PlayerId);if(!g.currentQuestion)return '<div class="muted">ابدأ الجولة لاختيار لاعبين للمواجهة.</div>';const card=p=>{if(!p)return '<div class="player">لا يوجد لاعب لهذا الفريق</div>';const a=ans[p.playerId];return `<div class="player" style="display:grid;gap:8px"><b>${esc(p.name)}</b><small>${p.team==='team1'?esc(tn.team1||'الفريق الأحمر'):esc(tn.team2||'الفريق الأزرق')}</small><div class="faceAnswer">${a?`ضغط الزر — اسمع إجابته الآن`:'بانتظار ضغط زر الإجابة من الجوال'}</div><button class="btn gold" onclick="socket.emit('familyFaceoffWinner',{playerId:'${p.playerId}'})">اختياره فائز المواجهة</button></div>`};if(g.phase==='faceoff')return `<h2 class="h2">مواجهة بداية الجولة</h2><div class="players">${card(p1)}${card(p2)}</div><div class="muted" style="margin-top:10px">الإجابات الكاملة ظاهرة لك تحت. بعد ما يقولون الإجابة بصوتهم، اختر صاحب أقرب وأسرع إجابة.</div>`;if(g.phase==='choice'){const wp=players.find(p=>p.playerId===f.winnerPlayerId);return `<h2 class="h2">قرار الفائز</h2><div class="muted">${esc(wp?.name||'الفائز')} يختار الآن من جواله: يلعب السؤال أو يمرره للفريق الآخر.</div>`}return `<div class="muted">الفريق النشط الآن: ${esc(tn[g.activeTeam]||g.activeTeam||'—')}</div>`}
socket.on('stateUpdate',state=>{const g=state.games?.family||{},tq=state.teamNames||{},ts=state.teamScores||{};$('status').textContent=g.statusText||'—';$('bank').textContent=g.bank||0;$('round').textContent=g.round||0;$('rounds').textContent=g.settings?.rounds||5;$('team1Name').textContent=tq.team1||'الفريق الأحمر';$('team2Name').textContent=tq.team2||'الفريق الأزرق';$('team1Score').textContent=ts.team1||0;$('team2Score').textContent=ts.team2||0;$('team1').classList.toggle('active',g.activeTeam==='team1');$('team2').classList.toggle('active',g.activeTeam==='team2');$('team1Strikes').textContent='✖'.repeat(g.strikes?.team1||0)||'—';$('team2Strikes').textContent='✖'.repeat(g.strikes?.team2||0)||'—';$('question').textContent=g.currentQuestion?.q||'ابدأ الجولة لعرض السؤال';const msg=g.lastResultText||g.winnerText||'—';$('last').textContent=msg;if(msg&&msg!==lastMsg&&msg!=='—'){showToast(msg);lastMsg=msg}$('faceoffBox').innerHTML=renderFaceoff(g,state);$('answers').innerHTML=(g.currentQuestion?.answers||[]).map(a=>{const r=!!g.revealed?.[String(a.id)];return `<div class="answer ${r?'revealed':''}"><div class="num">${a.id+1}</div><div>${esc(a.text)}</div><div class="pts">${a.points}</div><button class="btn green" ${r?'disabled':''} onclick="socket.emit('familyRevealAnswer',{answerId:${a.id}})">${r?'مكشوف':'كشف'}</button></div>`}).join('')||'<div class="muted">لا يوجد سؤال حالي.</div>';$('players').innerHTML=(state.players||[]).map(p=>`<div class="player">${esc(p.name)}<br><small>${p.team==='team1'?(tq.team1||'الأحمر'):(tq.team2||'الأزرق')}</small></div>`).join('')||'<div class="player">لا يوجد لاعبون</div>';$('startBtn').style.display=['waiting','finished'].includes(g.phase)||!g.started?'inline-block':'none'});
</script></body></html>
