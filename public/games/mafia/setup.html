<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>إعدادات المافيا</title><script src="/socket.io/socket.io.js"></script><script src="/room-client.js"></script><script src="/game-pro-fx.js"></script>
<style>*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Segoe UI,sans-serif;color:#fff;background:radial-gradient(circle at top right, rgba(91,160,255,.18), transparent 30%),radial-gradient(circle at top left, rgba(255,118,146,.14), transparent 30%),linear-gradient(135deg,#07111f,#122946);min-height:100vh}.glass{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);border-radius:28px;box-shadow:0 18px 50px rgba(0,0,0,.28);backdrop-filter:blur(14px)}.top{position:sticky;top:0;padding:14px 18px;background:rgba(4,14,28,.58);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.08)}.bar{max-width:1220px;margin:0 auto;display:grid;grid-template-columns:70px 1fr 70px;align-items:center}.back{width:52px;height:52px;border:none;border-radius:18px;background:rgba(255,255,255,.10);color:#fff;border:1px solid rgba(255,255,255,.16);font-size:26px;font-weight:900;cursor:pointer}.title{text-align:center;font-size:30px;font-weight:900}.page{padding:22px}.wrap{max-width:1220px;margin:0 auto}.card{padding:24px}.h2{font-size:28px;font-weight:900;margin:0 0 12px}.sub{color:rgba(255,255,255,.8);line-height:1.9}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.input,.select{width:100%;padding:14px 16px;border-radius:16px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:#fff;outline:none}.select option{color:#111}.toggle{display:flex;justify-content:space-between;align-items:center;padding:14px;border-radius:18px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);font-weight:900}.toggle input{width:20px;height:20px}.btn{border:none;border-radius:18px;padding:14px 18px;font-size:16px;font-weight:900;cursor:pointer;color:#fff;background:linear-gradient(135deg,#47d98b,#0ea35b);width:100%;margin-top:16px}@media (max-width:900px){.grid{grid-template-columns:1fr}}</style><link rel="stylesheet" href="/game-pro-theme.css"></head><body>
<div class="top"><div class="bar"><div></div><div class="title">إعدادات لعبة المافيا</div><div></div></div></div>
<div class="page"><div class="wrap"><div class="glass card"><h2 class="h2">إعدادات اللعبة</h2><div class="sub">هنا تحدد وقت التحقيق ووقت التبرير والأدوار الإضافية وعدد المافيا، ثم تحفظ الإعدادات قبل بدء اللعبة.</div><div class="grid" style="margin-top:16px"><div><div class="sub" style="margin-bottom:8px">وقت التحقيق</div><input id="investigationSeconds" class="input" type="number" min="5" max="600"></div><div><div class="sub" style="margin-bottom:8px">وقت التبرير</div><input id="defenseSeconds" class="input" type="number" min="5" max="600"></div><div><div class="sub" style="margin-bottom:8px">عدد المافيا</div><select id="mafiaCount" class="select"></select></div><div></div><label class="toggle"><span>إضافة عمدة المواطنين</span><input id="enableMayor" type="checkbox"></label><label class="toggle"><span>إضافة قناص المواطنين</span><input id="enableSniper" type="checkbox"></label><label class="toggle"><span>إضافة لاعب بالحبلين</span><input id="enableRopePlayer" type="checkbox"></label><label class="toggle"><span>إضافة مافيا التسكيت</span><input id="enableSilentMafia" type="checkbox"></label></div><button class="btn" onclick="saveSettings()">حفظ ودخول اللعبة</button><button class="btn" style="background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16)" onclick="socket.emit('exitGameToTeams');setTimeout(()=>location.href=withRoom('/games'),80)">العودة لقائمة الألعاب</button></div></div></div>
<script>
const socket=createRoomSocket();
let stateCache=null;
function fillMafiaCount(total,current=1){const s=document.getElementById('mafiaCount');const max=Math.max(1,total-3);s.innerHTML='';for(let i=1;i<=max;i++){const o=document.createElement('option');o.value=i;o.textContent=i;s.appendChild(o)}s.value=Math.min(current,max)}
function apply(settings,playerCount){document.getElementById('investigationSeconds').value=settings.investigationSeconds||45;document.getElementById('defenseSeconds').value=settings.defenseSeconds||30;fillMafiaCount(playerCount||4,settings.mafiaCount||1);document.getElementById('enableMayor').checked=!!settings.enableMayor;document.getElementById('enableSniper').checked=!!settings.enableSniper;document.getElementById('enableRopePlayer').checked=!!settings.enableRopePlayer;document.getElementById('enableSilentMafia').checked=!!settings.enableSilentMafia;}
function saveSettings(){socket.emit('mafiaUpdateConfig',{mafiaCount:+document.getElementById('mafiaCount').value||1,investigationSeconds:+document.getElementById('investigationSeconds').value||45,defenseSeconds:+document.getElementById('defenseSeconds').value||30,enableMayor:document.getElementById('enableMayor').checked,enableSniper:document.getElementById('enableSniper').checked,enableRopePlayer:document.getElementById('enableRopePlayer').checked,enableSilentMafia:document.getElementById('enableSilentMafia').checked}); setTimeout(()=>location.href=withRoom('/games/mafia/host'),120);}
socket.on('stateUpdate',(state)=>{stateCache=state;apply((state.games||{}).mafia?.settings||{},(state.players||[]).length)});
</script></body></html>
