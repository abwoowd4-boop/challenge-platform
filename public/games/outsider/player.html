<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>برا السالفة - اللاعب</title><script src="/socket.io/socket.io.js"></script><script src="/room-client.js"></script><script src="/gamefx.js"></script><style>*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Segoe UI,sans-serif;min-height:100vh;color:#fff;background:radial-gradient(circle at top right, rgba(91,160,255,.18), transparent 30%),radial-gradient(circle at top left, rgba(255,118,146,.14), transparent 30%),linear-gradient(135deg,#07111f,#122946);display:flex;align-items:center;justify-content:center;padding:18px}.glass{width:min(96vw,720px);padding:24px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);border-radius:28px;box-shadow:0 18px 50px rgba(0,0,0,.28);backdrop-filter:blur(14px)}.title{text-align:center;margin:0;font-size:38px;font-weight:900}.sub{text-align:center;color:rgba(255,255,255,.78);line-height:1.8;margin:8px 0 16px}.input{width:100%;padding:14px 16px;border-radius:16px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:#fff;outline:none;font-size:15px}.btn{width:100%;border:none;border-radius:18px;padding:14px 18px;font-size:16px;font-weight:900;cursor:pointer;color:#fff;background:linear-gradient(135deg,#3c7dff,#625dff);margin-top:12px}.btn.ghost{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16)}.hidden{display:none!important}.badge{width:fit-content;margin:0 auto 14px;padding:10px 18px;border-radius:999px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);font-size:14px;font-weight:900}.word{font-size:clamp(38px,6vw,70px);text-align:center;font-weight:900;margin:12px 0}.state{padding:18px;border-radius:20px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);line-height:1.9;text-align:center}.voteGrid,.guessGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}@media (max-width:640px){.voteGrid,.guessGrid{grid-template-columns:1fr}}</style></head><body><div class="glass"><h1 class="title">برا السالفة</h1><div id="welcome" class="sub">اكتب اسمك ثم ادخل اللعبة</div><div id="entryBox" class="hidden"><input id="nameInput" class="input" placeholder="اكتب اسمك هنا"><button class="btn" onclick="joinGame()">دخول</button></div><div id="playerBox" class="hidden"><div id="phaseBadge" class="badge">—</div><div id="roleBadge" class="badge" style="margin-top:-4px;margin-bottom:10px">—</div><div id="categoryBadge" class="badge" style="margin-top:-4px;margin-bottom:10px">التصنيف: —</div><div id="secretWord" class="word">—</div><div id="statusText" class="state">بانتظار البداية</div><div id="voteBox" class="hidden"><div class="sub">صوّت على الشخص الذي تظن أنه برا السالفة</div><div id="voteGrid" class="voteGrid"></div></div><div id="guessBox" class="hidden"><div class="sub">حاول تخمين الكلمة الصحيحة</div><div id="guessGrid" class="guessGrid"></div></div></div></div><script>
const socket=createRoomSocket();
function getOrCreatePlayerId(){let id=localStorage.getItem('platform_player_id');if(!id){id='p_'+Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem('platform_player_id',id);}return id;}
const playerId=getOrCreatePlayerId(); let myName=localStorage.getItem('platform_player_name')||''; let mySecret={isOutsider:false,word:'',options:[]};
let currentOutsiderState={}; let currentPlayers=[]; let lastPhase='';
const els={welcome:document.getElementById('welcome'),entryBox:document.getElementById('entryBox'),playerBox:document.getElementById('playerBox'),nameInput:document.getElementById('nameInput'),phaseBadge:document.getElementById('phaseBadge'),roleBadge:document.getElementById('roleBadge'),categoryBadge:document.getElementById('categoryBadge'),secretWord:document.getElementById('secretWord'),statusText:document.getElementById('statusText'),voteBox:document.getElementById('voteBox'),voteGrid:document.getElementById('voteGrid'),guessBox:document.getElementById('guessBox'),guessGrid:document.getElementById('guessGrid')};
els.entryBox.classList.add('hidden'); els.playerBox.classList.add('hidden'); if(myName){ els.nameInput.value=myName; els.entryBox.classList.add('hidden'); els.playerBox.classList.remove('hidden'); } else { els.entryBox.classList.remove('hidden'); }
function registerCurrentPlayer(){ if(!myName) return; socket.emit('registerPlayer',{playerId,name:myName}); }
function joinGame(){ const name=els.nameInput.value.trim(); if(!name) return alert('اكتب اسمك أولاً'); myName=name; localStorage.setItem('platform_player_name',myName); registerCurrentPlayer(); }
function voteFor(targetId){ socket.emit('outsiderVote',{voterId:playerId,targetId}); }
function guessWord(word){ socket.emit('outsiderGuess',{playerId,word}); }
function renderOutsiderPlayer(){
  const g=currentOutsiderState||{}; const players=currentPlayers||[];
  if(!myName) return;
  const me=players.find(p=>p.playerId===playerId)||players.find(p=>p.name===myName);
  if(me){ els.entryBox.classList.add('hidden'); els.playerBox.classList.remove('hidden'); }
  els.phaseBadge.textContent=g.phaseLabel||'—';
  if(g.phase && g.phase!==lastPhase){ if(g.phase==='mandatory') GameFX.phaseOverlay('ابدأ الأسئلة',{duration:760}); else if(g.phase==='open') GameFX.phaseOverlay('أسئلة مفتوحة',{duration:760}); else if(g.phase==='voting'){ GameFX.phaseOverlay('التصويت',{duration:760}); GameFX.reveal(); } else if(g.phase==='guessing' && mySecret.isOutsider){ GameFX.phaseOverlay('خمن الكلمة',{duration:760}); GameFX.reveal(); } else if(g.phase==='finished'){ GameFX.win(); GameFX.celebrate(); } lastPhase=g.phase; }
  els.categoryBadge.textContent=`التصنيف: ${mySecret.category || g.category || 'اكلات'}`;
  els.roleBadge.textContent = mySecret.isOutsider ? 'دورك: برا السالفة' : 'دورك: داخل السالفة';
  els.roleBadge.style.background = mySecret.isOutsider ? 'rgba(239,71,111,.18)' : 'rgba(34,197,94,.18)';
  els.roleBadge.style.borderColor = mySecret.isOutsider ? 'rgba(239,71,111,.42)' : 'rgba(34,197,94,.42)';
  if(mySecret.isOutsider){ els.secretWord.textContent = g.phase==='guessing' ? 'اختر الكلمة الصحيحة' : 'أنت برا السالفة'; }
  else { els.secretWord.textContent = mySecret.word || (g.started ? 'جاري إظهار الكلمة...' : 'بانتظار البداية'); }
  if(g.phase==='mandatory'){ const pair=(g.mandatoryPairs||[])[g.currentPairIndex]||null; if(pair){ if(pair.askerId===playerId) els.statusText.textContent=`دورك الآن: اسأل ${((players.find(p=>p.playerId===pair.targetId)||{}).name)||'اللاعب'} سؤالاً إجابته نعم أو لا.`; else if(pair.targetId===playerId) els.statusText.textContent=`استعد، ${((players.find(p=>p.playerId===pair.askerId)||{}).name)||'اللاعب'} سيسألك الآن.`; else els.statusText.textContent='تابع الدور الحالي حتى يأتي دورك.'; } else els.statusText.textContent=g.statusText||'—'; }
  else if(g.phase==='open'){ els.statusText.textContent='الأسئلة مفتوحة الآن على الجميع. اسأل أي لاعب سؤالاً إجابته نعم أو لا، وراقب الإجابات بحذر.'; }
  else if(g.phase==='voting'){ els.statusText.textContent='بدأ التصويت. إذا اخترت برا السالفة بشكل صحيح تحصل على نقطة.'; }
  else if(g.phase==='guessing'){ els.statusText.textContent=mySecret.isOutsider?'اختر الكلمة الصحيحة من الخيارات لتحصل على نقطة.':'برا السالفة يحاول الآن تخمين الكلمة، انتظر النتيجة.'; }
  else if(g.phase==='finished'){ els.statusText.textContent=g.winnerText||g.statusText||'انتهت الجولة.'; }
  else { els.statusText.textContent=g.statusText||'بانتظار البداية'; }
  els.voteBox.classList.toggle('hidden', g.phase!=='voting');
  els.guessBox.classList.toggle('hidden', !(g.phase==='guessing' && mySecret.isOutsider));
  if(g.phase==='voting'){ els.voteGrid.innerHTML=players.filter(p=>p.playerId!==playerId).map(p=>`<button class="btn ghost" onclick="voteFor('${p.playerId}')">${p.name}</button>`).join(''); }
  else { els.voteGrid.innerHTML=''; }
  if(g.phase==='guessing' && mySecret.isOutsider){ els.guessGrid.innerHTML=(mySecret.options||[]).map(w=>`<button class="btn" onclick="guessWord('${w}')">${w}</button>`).join(''); }
  else { els.guessGrid.innerHTML=''; }
}
socket.on('connect',()=>{ if(myName) registerCurrentPlayer(); socket.emit('outsiderRequestSecret'); });
socket.on('playerRegistered',({name})=>{ myName=name; localStorage.setItem('platform_player_name',name); els.welcome.textContent=`مرحباً ${myName}`; els.entryBox.classList.add('hidden'); els.playerBox.classList.remove('hidden'); socket.emit('outsiderRequestSecret'); });
socket.on('outsiderSecret',(data)=>{ mySecret=data||{isOutsider:false,word:'',options:[]}; renderOutsiderPlayer(); });
socket.on('stateUpdate',(state)=>{ currentOutsiderState=(state.games||{}).outsider||{}; currentPlayers=state.players||[]; renderOutsiderPlayer(); socket.emit('outsiderRequestSecret'); });
socket.on('gameEnded',()=>location.replace(withRoom('/player')));
</script></body></html>
