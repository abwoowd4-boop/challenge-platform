<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>لعبة الحروف - لاعب</title><script src="/socket.io/socket.io.js"></script><script src="/room-client.js"></script>
<style>
*{box-sizing:border-box}:root{--team1:#51c84d;--team2:#7a57d1}body{margin:0;font-family:Tahoma,Segoe UI,sans-serif;min-height:100vh;color:#fff;background:radial-gradient(circle at top right, rgba(91,160,255,.18), transparent 30%),radial-gradient(circle at top left, rgba(255,118,146,.14), transparent 30%),linear-gradient(135deg,#07111f,#122946);display:grid;place-items:center;padding:12px}
.glass{width:min(100%,420px);padding:18px 16px;border-radius:26px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);box-shadow:0 18px 50px rgba(0,0,0,.28);backdrop-filter:blur(14px);position:relative;overflow:hidden}.glass::after{content:"";position:absolute;inset:auto -20% -50% -20%;height:140px;background:radial-gradient(circle,rgba(255,255,255,.10),transparent 60%);filter:blur(24px);pointer-events:none}
.title{text-align:center;margin:0;font-size:30px;font-weight:900}.sub{text-align:center;color:rgba(255,255,255,.78);line-height:1.7;margin:6px 0 12px;font-size:14px}.input{width:100%;padding:13px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:#fff;outline:none;font-size:15px}.btn{width:100%;border:none;border-radius:16px;padding:13px 16px;font-size:16px;font-weight:900;cursor:pointer;color:#fff;background:linear-gradient(135deg,#3c7dff,#625dff);margin-top:10px;transition:transform .18s ease, box-shadow .18s ease, opacity .18s ease}.btn:hover{transform:translateY(-1px);box-shadow:0 12px 24px rgba(0,0,0,.18)}
.headGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.mini{padding:12px;border-radius:18px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);font-size:14px;font-weight:900;text-align:center}.mini strong{display:block;font-size:18px;margin-top:4px}
.stageBar{display:none!important}.stage{display:none!important}.stage.active{display:none!important}
.letterHero{margin-top:12px;padding:14px;border-radius:24px;background:linear-gradient(135deg,rgba(255,216,77,.18),rgba(255,255,255,.08));border:1px solid rgba(255,216,77,.3);text-align:center}.letterLabel{font-size:16px;font-weight:800;color:rgba(255,255,255,.86)}.letterValue{font-size:clamp(44px,16vw,80px);font-weight:900;line-height:1;color:#ffe69a;text-shadow:0 0 24px rgba(255,216,77,.16);margin-top:6px}
.timer{margin-top:10px;text-align:center;font-size:28px;font-weight:900;color:#ffd166}.timer.urgent{animation:timerPulse .6s infinite alternate}.timerBar{height:10px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;border:1px solid rgba(255,255,255,.08);margin-top:8px}.timerFill{height:100%;width:0;background:linear-gradient(90deg,#ffd166,#ef476f);transition:width .24s ease}.timerBar.urgent .timerFill{animation:barBlink .38s infinite alternate}.statusAccent{margin-top:10px;padding:10px 12px;border-radius:16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);text-align:center;font-weight:800;font-size:14px}.winnerBadge{margin-top:10px;padding:12px 14px;border-radius:18px;background:linear-gradient(135deg,rgba(255,215,64,.2),rgba(255,255,255,.08));border:1px solid rgba(255,215,64,.34);text-align:center;font-size:18px;font-weight:900;display:none}.winnerBadge.show{display:block;animation:winnerRise .55s ease}.note{margin-top:12px;padding:14px;border-radius:18px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);line-height:1.7;text-align:center;font-size:14px}
.buzz{margin-top:14px;min-height:128px;font-size:34px;font-weight:900;border-radius:24px;background:linear-gradient(135deg,#47d98b,#0ea35b);position:relative;overflow:hidden;box-shadow:0 14px 24px rgba(14,163,91,.18)}.buzz::after{content:"";position:absolute;inset:0;transform:translateX(-120%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent)}.buzz.active{animation:buzzPulse .9s ease-in-out infinite alternate}.buzz.active::after{animation:shimmer 1.4s linear infinite}.buzz.locked{background:linear-gradient(135deg,#5f6776,#394150)!important;box-shadow:0 14px 24px rgba(0,0,0,.16)}.buzz.locked::after{display:none}.hidden{display:none!important}
@keyframes shimmer{to{transform:translateX(120%)}}@keyframes buzzPulse{from{transform:scale(1)}to{transform:scale(1.02)}}@keyframes timerPulse{from{filter:brightness(1)}to{filter:brightness(1.28)}}@keyframes barBlink{from{filter:brightness(1)}to{filter:brightness(1.42)}}@keyframes winnerRise{0%{opacity:0;transform:translateY(12px) scale(.95)}100%{opacity:1;transform:none}}
@media (max-width:480px){body{padding:10px}.glass{width:100%;padding:16px 14px;border-radius:22px}.title{font-size:26px}.headGrid{gap:8px}.mini{padding:10px;font-size:13px}.mini strong{font-size:16px}.letterValue{font-size:clamp(40px,15vw,68px)}.timer{font-size:24px}.buzz{min-height:112px;font-size:30px;border-radius:20px}}
</style></head><body><div class="glass"><h1 class="title">لعبة الحروف</h1><div id="welcome" class="sub">اكتب اسمك للدخول</div><div id="entryBox" class="hidden"><input id="nameInput" class="input" placeholder="اكتب اسمك هنا" /><button class="btn" onclick="joinGame()">دخول</button></div><div id="playerBox" class="hidden"><div class="headGrid"><div class="mini">فريقك<strong id="myTeamName">—</strong></div><div class="mini">نقاطك<strong id="myScore">0</strong></div></div><div class="letterHero"><div class="letterLabel">الحرف الحالي</div><div id="currentLetter" class="letterValue">—</div></div><div id="timerBox" class="timer">—</div><div class="timerBar" id="timerBar"><div class="timerFill" id="timerFill"></div></div><div id="statusAccent" class="statusAccent">جاهز</div><div id="winnerBadge" class="winnerBadge">🏆 تم إعلان الفائز</div><div id="statusBox" class="note">بانتظار بداية الجولة</div><button id="buzzBtn" class="btn buzz" onclick="buzz()">اضغط للإجابة</button></div></div>
<script>
const socket=createRoomSocket(); socket.emit('lettersPrime'); function getOrCreatePlayerId(){let id=localStorage.getItem('platform_player_id');if(!id){id='p_'+Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem('platform_player_id',id);}return id;} const playerId=getOrCreatePlayerId(); let myName=localStorage.getItem('platform_player_name')||'', registered=false, lastTimerValue=null, lastResponderId='', lastWinnerTeam='', lastPhase=''; entryBox.classList.add('hidden'); playerBox.classList.add('hidden'); if(myName){nameInput.value=myName; welcome.classList.add('hidden'); playerBox.classList.remove('hidden');} else {welcome.classList.remove('hidden'); entryBox.classList.remove('hidden');}
const PSTAGES=['letter','buzz','answer','wait']; function pStageLabel(s){return {letter:'الحرف',buzz:'الضغط',answer:'إجابة',wait:'انتظار'}[s]||s} function renderStages(active){ stageBar.innerHTML=PSTAGES.map(s=>`<div class="stage ${s===active?'active':''}">${pStageLabel(s)}</div>`).join('') }
function registerCurrentPlayer(){if(!myName||registered)return;socket.emit('registerPlayer',{playerId,name:myName})}
function joinGame(){const name=nameInput.value.trim();if(!name)return alert('اكتب اسمك أولاً');myName=name;localStorage.setItem('platform_player_name',myName);registered=false;primeAudio();registerCurrentPlayer()}
function buzz(){primeAudio(); playBuzzTap(); socket.emit('lettersBuzz',{playerId})}
let audioCtx=null; function primeAudio(){try{audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume();}catch(e){}}
function tone(freq=440,duration=.12,type='sine',volume=.03,delay=0){if(!audioCtx) return; const start=audioCtx.currentTime+delay; const osc=audioCtx.createOscillator(); const gain=audioCtx.createGain(); osc.type=type; osc.frequency.setValueAtTime(freq,start); gain.gain.setValueAtTime(0,start); gain.gain.linearRampToValueAtTime(volume,start+.01); gain.gain.exponentialRampToValueAtTime(0.0001,start+duration); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(start); osc.stop(start+duration+.02)}
function playBuzzTap(){primeAudio(); tone(520,.06,'triangle',.025,0); tone(760,.08,'square',.02,.05)} function playAccept(){primeAudio(); tone(740,.08,'triangle',.03,0); tone(920,.12,'sine',.025,.05)} function playStart(){primeAudio(); [0,1,2].forEach(i=>tone(400+i*120,.15,'triangle',.03,i*.08))} function playUrgent(v){primeAudio(); tone(v<=1?980:860,.05,'sawtooth',.013,0)} function playWinner(team){primeAudio(); const base=team==='team1'?430:530; [0,1,2,3].forEach(i=>tone(base+i*110,.16,'triangle',.04,i*.08));}
window.addEventListener('pointerdown', primeAudio, {once:true}); window.addEventListener('keydown', primeAudio, {once:true});
socket.on('connect',()=>{if(myName){registered=false;registerCurrentPlayer()}}); socket.on('playerRegistered',({name})=>{myName=name;registered=true;welcome.textContent=`مرحباً ${name}`;entryBox.classList.add('hidden');playerBox.classList.remove('hidden')}); socket.on('lettersBuzzRejected',({message})=>alert(message||'تعذر الضغط')); socket.on('lettersBuzzAccepted',()=>{playAccept(); statusAccent.textContent='تم تسجيل ضغطتك';});
socket.on('stateUpdate',(state)=>{const appState=state.appState||{}; if(appState.selectedGame&&appState.selectedGame!=='letters'&&appState.currentView!=='lobby'){window.location.replace(withRoom('/player'));return}
  const players=state.players||[]; const me=players.find(p=>p.playerId===playerId)||players.find(p=>p.name===myName); if(me){entryBox.classList.add('hidden');playerBox.classList.remove('hidden')} const teamNames=state.teamNames||{}; const letters=(state.games||{}).letters||{}; myTeamName.textContent=me&&me.team?(teamNames[me.team]||me.team):'بدون فريق'; myScore.textContent=state.playerScores?.[myName]||0; currentLetter.textContent=letters.currentLetter||'—'; timerBox.textContent=letters.timerSecondsLeft?`${letters.timerLabel||'الوقت'}: ${letters.timerSecondsLeft} ث`:'—';
  const pct=letters.timerMaxSeconds?Math.max(0,Math.min(100,(letters.timerSecondsLeft/letters.timerMaxSeconds)*100)):0; timerFill.style.width=`${pct}%`; timerBar.classList.toggle('urgent',!!letters.timerSecondsLeft&&letters.timerSecondsLeft<=3); timerBox.classList.toggle('urgent',!!letters.timerSecondsLeft&&letters.timerSecondsLeft<=3);
  const myTeam=me?.team||''; const canBuzz=!!me && letters.phase==='running' && !letters.winnerTeam && (letters.buzzMode==='open' || (letters.buzzMode==='team1_only'&&myTeam==='team1') || (letters.buzzMode==='team2_only'&&myTeam==='team2')) && !(letters.answerStage==='primary'&&letters.currentResponderId) && !(letters.answerStage==='secondary'&&letters.currentResponderId&&myTeam===letters.currentAnswerTeam); const amResponder=!!me&&letters.currentResponderId===me.playerId;
  let msg='بانتظار بداية اللعبة', accent='استعد', activeStage='wait';
  if(letters.winnerTeam){msg=`الفائز: ${teamNames[letters.winnerTeam]||letters.winnerTeam}`; accent='انتهت الجولة'; activeStage='wait';}
  else if(!letters.currentLetter){msg='بانتظار اختيار الحرف'; accent='تابع الشاشة'; activeStage='letter';}
  else if(amResponder){msg='أنت المختار للإجابة الآن'; accent='جاوب بسرعة'; activeStage='answer';}
  else if(letters.answerStage==='secondary' && letters.currentAnswerTeam){msg=myTeam===letters.currentAnswerTeam?'الفرصة الآن لفريقكم':'بانتظار انتهاء فرصة الفريق الآخر'; accent=myTeam===letters.currentAnswerTeam?'اضغط إذا سمح لكم':'انتظر'; activeStage=myTeam===letters.currentAnswerTeam?'buzz':'wait';}
  else if(letters.answerStage==='primary' && letters.currentResponderName){msg=`${letters.currentResponderName} يجيب الآن`; accent='الضغط مقفل مؤقتًا'; activeStage='wait';}
  else if(letters.phase==='running'){msg='الزر مفتوح الآن'; accent='استعد للضغط'; activeStage='buzz';}
  renderStages(activeStage); statusBox.textContent=msg; statusAccent.textContent=accent; buzzBtn.disabled=!canBuzz; buzzBtn.style.opacity=canBuzz?'1':'.72'; buzzBtn.classList.toggle('active',canBuzz); buzzBtn.classList.toggle('locked',!canBuzz); buzzBtn.textContent=canBuzz?'اضغط للإجابة':'مقفل مؤقتًا'; winnerBadge.classList.toggle('show',!!letters.winnerTeam); if(letters.winnerTeam) winnerBadge.textContent=`🏆 ${teamNames[letters.winnerTeam]||letters.winnerTeam} فاز`;
  const timerVal=Number(letters.timerSecondsLeft||0); if(timerVal&&timerVal<=3&&timerVal!==lastTimerValue) playUrgent(timerVal); if(letters.phase==='running'&&lastPhase&&lastPhase!=='running') playStart(); if(letters.currentResponderId===playerId&&lastResponderId!==playerId) playAccept(); if(letters.winnerTeam&&letters.winnerTeam!==lastWinnerTeam) playWinner(letters.winnerTeam); lastTimerValue=timerVal; lastResponderId=letters.currentResponderId||''; lastWinnerTeam=letters.winnerTeam||''; lastPhase=letters.phase||'';
}); socket.on('gameEnded',()=>window.location.replace(withRoom('/player')));
</script></body></html>
