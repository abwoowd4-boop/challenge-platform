<!DOCTYPE html><html lang="ar" dir="rtl"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>تفعيل الحساب</title>
<style>*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Segoe UI,sans-serif;min-height:100vh;color:#fff;background:radial-gradient(circle at top right, rgba(91,160,255,.18), transparent 30%),radial-gradient(circle at top left, rgba(255,118,146,.14), transparent 30%),linear-gradient(135deg,#07111f,#122946);display:flex;align-items:center;justify-content:center;padding:20px}.card{width:min(560px,100%);background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);border-radius:30px;box-shadow:0 18px 50px rgba(0,0,0,.28);backdrop-filter:blur(14px);padding:28px}.title{text-align:center;font-size:40px;font-weight:900;margin:0 0 8px}.sub{text-align:center;color:rgba(255,255,255,.78);line-height:1.9;margin:0 0 20px}.label{display:block;margin-bottom:8px;font-weight:800;color:rgba(255,255,255,.86)}.input{width:100%;padding:18px 18px;border-radius:18px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#fff;font-size:22px;font-weight:900;letter-spacing:2px;text-transform:uppercase;text-align:center;outline:none}.btn{width:100%;border:none;border-radius:18px;padding:16px 18px;font-size:18px;font-weight:900;cursor:pointer;color:#fff;background:linear-gradient(135deg,#3c7dff,#625dff);margin-top:12px}.btn.secondary{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16)}.msg{min-height:24px;margin-top:12px;color:#ffd6de;font-weight:800;text-align:center}</style>
</head><body><div class="card"><h1 class="title">تفعيل الاشتراك</h1><p class="sub">أدخل كود التفعيل الذي وصلك بعد الشراء. بعد التفعيل سيتم إنشاء غرفتك الثابتة ويرتبط حسابك بها مباشرة.</p><label class="label">كود التفعيل</label><input id="code" class="input" maxlength="24" placeholder="PRO-XXXX-XXXX"><button class="btn" onclick="activate()">تفعيل الآن</button><button class="btn secondary" onclick="location.href='/dashboard'">تخطي إلى لوحة العميل</button><div id="msg" class="msg"></div></div><script>
const msg=document.getElementById('msg');
function token(){return localStorage.getItem('challenge_user_token')||''}
function headers(){const t=token(); return {'Content-Type':'application/json','Authorization':'Bearer '+t};}
async function requireLogin(){if(!token()){location.href='/login';return false;} return true;}
async function activate(){if(!await requireLogin()) return; msg.textContent='جارِ تفعيل الحساب...'; const code=document.getElementById('code').value.trim().toUpperCase(); try{const res=await fetch('/api/auth/activate',{method:'POST',headers:headers(),body:JSON.stringify({code})}); const data=await res.json(); if(!res.ok){msg.textContent=data.message||'تعذر التفعيل'; return;} location.href='/dashboard';}catch(e){msg.textContent='تعذر الاتصال بالخادم';}}
document.getElementById('code').addEventListener('input',e=>e.target.value=e.target.value.toUpperCase()); requireLogin();
</script></body></html>
