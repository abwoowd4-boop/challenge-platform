<!DOCTYPE html><html lang="ar" dir="rtl"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>لوحة العميل</title><script src="/room-client.js"></script>
<style>*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Segoe UI,sans-serif;min-height:100vh;color:#fff;background:radial-gradient(circle at top right, rgba(91,160,255,.18), transparent 30%),radial-gradient(circle at top left, rgba(255,118,146,.14), transparent 30%),linear-gradient(135deg,#07111f,#122946);padding:20px}.wrap{width:min(1180px,100%);margin:0 auto}.top{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px}.title{font-size:42px;font-weight:900;margin:0}.sub{color:rgba(255,255,255,.78);margin:4px 0 0;line-height:1.8}.btn{border:none;border-radius:18px;padding:14px 18px;font-size:16px;font-weight:900;cursor:pointer;color:#fff;background:linear-gradient(135deg,#3c7dff,#625dff)}.btn.ghost{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16)}.glass{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);border-radius:30px;box-shadow:0 18px 50px rgba(0,0,0,.28);backdrop-filter:blur(14px)}.card{padding:24px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.label{font-size:14px;color:rgba(255,255,255,.62);font-weight:800;margin-bottom:8px}.value{font-size:28px;font-weight:900}.statusChip{display:inline-flex;padding:10px 14px;border-radius:999px;font-weight:900;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16)}.links{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}.small{font-size:14px;color:rgba(255,255,255,.74);line-height:1.8}.msg{min-height:24px;margin-top:12px;color:#cde7ff;font-weight:800}.codeBox{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;border-radius:20px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15)}.code{font-size:28px;font-weight:900;letter-spacing:2px}@media (max-width:900px){.grid,.links{grid-template-columns:1fr}}</style>
</head><body><div class="wrap"><div class="top"><div><h1 class="title">لوحة العميل</h1><p class="sub">من هنا تصل بسرعة إلى شاشة عرض غرفتك وروابط التحكم واللاعبين لنفس الجلسة كل مرة.</p></div><div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn ghost" onclick="logout()">تسجيل الخروج</button></div></div><div class="grid"><div class="glass card"><div class="label">الحساب</div><div id="userName" class="value">—</div><div id="userEmail" class="small" style="margin-top:6px">—</div><div style="margin-top:18px" class="label">حالة الاشتراك</div><div id="status" class="statusChip">—</div><div style="margin-top:18px" class="label">كود الغرفة الثابتة</div><div class="codeBox"><div id="roomCode" class="code">----</div><button class="btn ghost" onclick="copyRoom()">نسخ</button></div><div id="msg" class="msg"></div></div><div class="glass card"><div class="label">الوصول السريع</div><div class="small">إذا كان حسابك مفعلًا، فهذه الأزرار ستفتح غرفتك نفسها مباشرة.</div><div class="links"><button class="btn" onclick="openTarget('screen')">شاشة العرض</button><button class="btn ghost" onclick="openTarget('host')">لوحة التحكم</button><button class="btn ghost" onclick="openTarget('player')">رابط اللاعب</button></div><div class="links"><button class="btn ghost" onclick="copyLink('screen')">نسخ رابط العرض</button><button class="btn ghost" onclick="copyLink('host')">نسخ رابط التحكم</button><button class="btn ghost" onclick="copyLink('player')">نسخ رابط اللاعب</button></div><div style="margin-top:18px"><button id="activateBtn" class="btn" onclick="location.href='/activate'">تفعيل الحساب أو إدخال كود جديد</button></div></div></div></div><script>
const tokenKey='challenge_user_token'; let currentUser=null; const msg=document.getElementById('msg');
function token(){return localStorage.getItem(tokenKey)||''}
function headers(){return {'Authorization':'Bearer '+token()};}
function requireAuth(){if(!token()){location.href='/login'; return false;} return true;}
async function load(){if(!requireAuth()) return; const res=await fetch('/api/auth/me',{headers:headers()}); if(!res.ok){localStorage.removeItem(tokenKey); location.href='/login'; return;} const data=await res.json(); currentUser=data.user; document.getElementById('userName').textContent=currentUser.name||'—'; document.getElementById('userEmail').textContent=currentUser.email||'—'; document.getElementById('status').textContent=currentUser.activated?('مفعل - '+(currentUser.plan||'pro')):'بانتظار التفعيل'; document.getElementById('roomCode').textContent=currentUser.roomId||'----'; document.getElementById('activateBtn').textContent=currentUser.activated?'إدارة التفعيل':'تفعيل الحساب'; if(currentUser.roomId) localStorage.setItem('challenge_last_room', currentUser.roomId); }
function room(){return (currentUser&&currentUser.roomId)||''}
function target(kind){const code=room(); if(!code){location.href='/activate'; return '';} if(kind==='screen') return withRoom('/', code); if(kind==='player') return withRoom('/player', code); return withRoom('/host', code);}
function openTarget(kind){const url=target(kind); if(url) location.href=url;}
async function copyLink(kind){const url=location.origin+target(kind); if(!url) return; try{await navigator.clipboard.writeText(url); msg.textContent='تم نسخ الرابط.';}catch(e){msg.textContent='تعذر نسخ الرابط.';}}
async function copyRoom(){if(!room()) return; try{await navigator.clipboard.writeText(room()); msg.textContent='تم نسخ كود الغرفة.';}catch(e){msg.textContent='تعذر نسخ الكود.';}}
async function logout(){try{await fetch('/api/auth/logout',{method:'POST',headers:headers()});}catch(e){} localStorage.removeItem(tokenKey); sessionStorage.removeItem('challenge_after_login_redirect'); location.href='/login';}
load();
</script></body></html>
